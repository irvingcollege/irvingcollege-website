local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

logo:
  src: "/images/1080logo.jpg"
  show_in_header: true

editor:
  preview: false

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "this_week"
        label: "This Week at ICBC"
        file: "src/data/this-week.json"
        format: "json"

        fields:
          - label: "Show This Section"
            name: "enabled"
            widget: "boolean"

          - label: "Small Heading"
            name: "eyebrow"
            widget: "string"

          - label: "Main Heading"
            name: "heading"
            widget: "string"

          - label: "Introduction"
            name: "introduction"
            widget: "text"

          - label: "Sunday Worship"
            name: "sermon"
            widget: "object"

            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Time"
                name: "time"
                widget: "string"

          - label: "Wednesday Meal"
            name: "wednesdayMeal"
            widget: "object"

            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Time"
                name: "time"
                widget: "string"

              - label: "Meal Menu"
                name: "menu"
                widget: "string"

          - label: "Wednesday Bible Study"
            name: "bibleStudy"
            widget: "object"

            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Time"
                name: "time"
                widget: "string"

          - label: "Featured Announcement"
            name: "announcement"
            widget: "object"

            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Memory Verse"
            name: "memoryVerse"
            widget: "object"

            fields:
              - label: "Bible Reference"
                name: "reference"
                widget: "string"

              - label: "Verse Text"
                name: "text"
                widget: "text"

  - name: "staff"
    label: "Staff"
    label_singular: "Staff Member"
    folder: "src/data/staff"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.order}}-{{slug}}"
    summary: "{{fields.order}} — {{name}} — {{position}}"

    fields:
      - label: "Name"
        name: "name"
        widget: "string"

      - label: "Position"
        name: "position"
        widget: "string"

      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false

      - label: "Email"
        name: "email"
        widget: "string"
        required: false

      - label: "Phone"
        name: "phone"
        widget: "string"
        required: false

      - label: "Biography"
        name: "body"
        widget: "markdown"
        required: false

      - label: "Display Order"
        name: "order"
        widget: "number"
        value_type: "int"
        min: 1
        default: 1
        hint: "Use 1 for the first person, 2 for the second person, and so on."

      - label: "Show on Website"
        name: "enabled"
        widget: "boolean"
        default: true